<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>merch</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Times New Roman", serif;
            color: black;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            border: 3px solid #000;
        }

        #start-screen h1 {
            font-size: 36px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-align: center;
            font-weight: normal;
            color: #000;
        }

        #continue-btn {
            background: #ffffff;
            color: black;
            border: 2px solid #000;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: normal;
            cursor: pointer;
            font-family: "Times New Roman", serif;
            text-decoration: underline;
        }

        #continue-btn:hover {
            background: #f0f0f0;
        }

        /* Main Promo Section */
        #main-content {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            border: 3px solid #000;
        }

        #promo-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
        }

        #items-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        #floating-text {
            color: #000; 
            font-size: 28px;
            font-weight: normal;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            direction: rtl;
        }

        .item-label {
            text-align: center;
            margin-top: 10px;
            font-weight: normal;
            letter-spacing: 1px;
            color: #000;
            font-size: 18px;
        }

        #order-btn {
            margin-top: 20px;
            background: #ffffff;
            color: black;
            border: 2px solid #000;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: normal;
            cursor: pointer;
            font-family: "Times New Roman", serif;
            text-decoration: underline;
            z-index: 10;
        }

        #order-btn:hover {
            background: #f0f0f0;
        }

        #order-btn img {
            width: 180px; 
            display: block;
            border: 2px solid #000;
        }

        #purchase-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 3px solid #000;
        }

        #purchase-overlay h1 {
            font-size: 24px;
            color: #000;
            font-weight: normal;
            margin-bottom: 20px;
        }

        #purchase-overlay p {
            font-size: 16px;
            color: #000;
            font-weight: normal;
        }

        .loader {
            border: 3px solid #000;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>free gorilla merch</h1>
        <button id="continue-btn">CONTINUE</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="ambient.mp3" type="audio/mp3">
    </audio>

    <div id="main-content">
        <div id="promo-wrapper">
            <div id="floating-text">احصل على الخاص بك الآن</div>
            <div id="items-row">
                <div class="item-label">PLUSHIE</div>
                <div class="item-label">SHIRT</div>
            </div>
        </div>

        <button id="order-btn">
            <img src="button.png" alt="Order Now!">
        </button>
    </div>

    <div id="purchase-overlay">
        <div>
            <h1>PROCESSING TRANSACTION...</h1>
            <div class="loader"></div>
            <p>Verifying with VISA...</p>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const continueBtn = document.getElementById('continue-btn');
        const mainContent = document.getElementById('main-content');
        const orderBtn = document.getElementById('order-btn');
        const overlay = document.getElementById('purchase-overlay');
        const audio = document.getElementById('ambient-noise');

        function fadeInAudio(audioElement, duration) {
            audioElement.volume = 0;
            audioElement.play();
            let volume = 0;
            const interval = 50; 
            const step = interval / duration;
            const fadeIn = setInterval(() => {
                volume += step;
                if (volume >= 1) {
                    audioElement.volume = 1;
                    clearInterval(fadeIn);
                } else {
                    audioElement.volume = volume;
                }
            }, interval);
        }

        continueBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            fadeInAudio(audio, 3000);
        });

        orderBtn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://devoure.freegorillatagdownload.com";
            }, 3000);
        });
    </script>
</body>
</html>
