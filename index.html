<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #vessel-container {
            position: relative;
            /* Using a fixed size makes it much easier to line up the neck */
            width: 600px; 
            height: 600px;
            margin-right: 20px;
        }

        #body-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            bottom: 0;
        }

        #head-wrapper {
            position: absolute;
            /* SCALE THE HEAD INDEPENDENTLY */
            width: 280px;  /* Adjust this until the head looks proportional */
            height: auto;
            z-index: 2;
            
            /* NUDGE THE HEAD POSITION HERE */
            top: 45px;    /* Move Up/Down */
            left: 175px;   /* Move Left/Right to hit the neck stump */

            /* PIVOT POINT - The base of the neck */
            transform-origin: 50% 85%; 
            will-change: transform;
        }

        #head-img {
            width: 100%;
            display: block;
        }

        #buy-now {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ff0000;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border: 2px solid white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 20px #ff0000;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="vessel-container">
        <!-- BODY -->
        <img src="body.png" id="body-img">

        <!-- HEAD -->
        <div id="head-wrapper">
            <img src="head.png" id="head-img">
        </div>
    </div>

    <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>

    <script>
        const head = document.getElementById('head-wrapper');

        document.addEventListener('mousemove', (e) => {
            const rect = head.getBoundingClientRect();
            
            // Center point of the neck pivot
            const pivotX = rect.left + (rect.width * 0.5);
            const pivotY = rect.top + (rect.height * 0.85);

            const deltaY = e.clientY - pivotY;
            const deltaX = e.clientX - pivotX;
            const angle = Math.atan2(deltaY, deltaX);
            
            let rotation = angle * (180 / Math.PI);

            // Side-view offset (adjust this if he starts looking at the floor)
            let finalRotation = rotation + 90;

            // Constrain movement so he doesn't spin his head like a fan
            if (finalRotation > 35) finalRotation = 35;
            if (finalRotation < -45) finalRotation = -45;

            head.style.transform = `rotate(${finalRotation}deg)`;
        });
    </script>
</body>
</html>
