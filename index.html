<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Moves content to the right */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            padding-right: 5%; /* Distance from the right edge */
        }

        #vessel-container {
            position: relative;
            width: 450px; /* Adjust based on your image size */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* THE BODY */
        #body-img {
            width: 100%;
            height: auto;
            z-index: 1;
            margin-top: -50px; /* Pulls body up to connect to head */
        }

        /* THE HEAD */
        #head-wrapper {
            position: relative;
            width: 40%; /* Head size relative to the container */
            z-index: 2;
            /* This ensures it rotates from the neck/base of the head */
            transform-origin: bottom center; 
            perspective: 1000px;
        }

        #head-img {
            width: 100%;
            height: auto;
            display: block;
        }

        #buy-now {
            margin-top: 30px;
            background: #ff0000;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border: 2px solid white;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            z-index: 10;
        }

        #buy-now:hover {
            background: white;
            color: red;
        }
    </style>
</head>
<body>

    <div id="vessel-container">
        <!-- HEAD SECTION -->
        <div id="head-wrapper">
            <img src="head.png" id="head-img" alt="Vessel Head">
        </div>

        <!-- BODY SECTION -->
        <img src="body.png" id="body-img" alt="Vessel Body">

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">
            ORDER THE VESSEL
        </a>
    </div>

    <script>
        const head = document.getElementById('head-wrapper');

        document.addEventListener('mousemove', (e) => {
            const rect = head.getBoundingClientRect();
            
            // Get center of the head
            const headCenterX = rect.left + rect.width / 2;
            const headCenterY = rect.top + rect.height / 2;

            // Calculate vertical angle
            const deltaY = e.clientY - headCenterY;
            const deltaX = e.clientX - headCenterX;
            const angle = Math.atan2(deltaY, deltaX);
            
            // Convert to degrees and constrain the movement
            // We focus on the Y-axis (up/down)
            let rotation = (deltaY / window.innerHeight) * 45; // Max 45 degree tilt

            // Apply rotation
            // We use rotateX to tilt the head toward the camera/away
            head.style.transform = `rotateX(${-rotation}deg)`;
        });
    </script>
</body>
</html>
