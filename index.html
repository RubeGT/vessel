<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #vessel-container {
            position: relative;
            /* Matches the scale of the body to the head perfectly */
            width: 900px; 
            height: 900px;
            margin-right: -100px;
        }

        /* Both images are now forced to be the same size so they align naturally */
        .vessel-part {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        #body-img {
            z-index: 1;
        }

        #head-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* Adjust the % until the "+" is exactly on the neck stump */
            transform-origin: 49% 21%; 
            will-change: transform;
        }

        #head-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #buy-now {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #ff0000;
            color: white;
            padding: 20px 40px;
            text-decoration: none;
            border: 3px solid white;
            font-weight: bold;
            font-size: 28px;
            box-shadow: 0 0 30px #ff0000;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="vessel-container">
        <!-- BODY -->
        <img src="body.png" id="body-img" class="vessel-part">

        <!-- HEAD WRAPPER -->
        <div id="head-wrapper">
            <img src="head.png" id="head-img">
        </div>
    </div>

    <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>

    <script>
        const head = document.getElementById('head-wrapper');

        document.addEventListener('mousemove', (e) => {
            const rect = head.getBoundingClientRect();
            
            // Calculate center of head-wrapper for rotation
            // 0.49 and 0.21 match the transform-origin % in CSS
            const pivotX = rect.left + (rect.width * 0.49);
            const pivotY = rect.top + (rect.height * 0.21);

            const deltaY = e.clientY - pivotY;
            const deltaX = e.clientX - pivotX;
            const angle = Math.atan2(deltaY, deltaX);
            
            let rotation = angle * (180 / Math.PI);

            // Side view calibration
            let finalRotation = rotation + 10; 

            // Neck safety clamping
            if (finalRotation > 25) finalRotation = 25;
            if (finalRotation < -45) finalRotation = -45;

            head.style.transform = `rotate(${finalRotation}deg)`;
        });
    </script>
</body>
</html>
