<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vessel</title>
    <style>
        body {
            background-color: #000; /* Pure black to match your image */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #plushie-wrapper {
            position: relative;
            width: 500px; /* Base width */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        /* Adjusted to fit the gorilla's face plate precisely */
        .eye-container {
            position: absolute;
            top: 17.5%;  /* Positioned specifically for the head in your image */
            left: 50%;
            transform: translateX(-50%);
            width: 100px; /* Narrower spacing for the gorilla face */
            height: 50px;
            display: flex;
            justify-content: space-between;
            z-index: 2;
            pointer-events: none;
        }

        .eye-socket {
            width: 35px; 
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-img {
            width: 100%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.02s linear;
        }

        /* Matches the red glow button in your screenshot */
        #buy-now {
            margin-top: 20px;
            background: #ff0000;
            color: white;
            padding: 20px 40px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer;
            text-decoration: none;
            font-size: 24px;
            text-align: center;
            box-shadow: 0 0 20px #ff0000;
            z-index: 10;
        }

        #buy-now:hover {
            filter: brightness(1.3);
            box-shadow: 0 0 35px #ff0000;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png">
        
        <div class="eye-container">
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img">
            </div>
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img">
            </div>
        </div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">
            feed the vessel
        </a>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye-img');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                
                // Finding center point of the eye
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                // Calculate angle to mouse
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const rot = angle * (180 / Math.PI);

                // + 90 ensures the "pupil" follows the mouse if the image faces up
                // If it looks backwards, change 90 to 270 or -90
                eye.style.transform = `rotate(${rot + 90}deg)`;
            });
        });
    </script>
</body>
</html>
