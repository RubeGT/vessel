<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #plushie-wrapper {
            position: relative;
            display: inline-block;
            /* Match the width of your bodynoeyes.png */
            width: 600px; 
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* THE FACE PLATE POSITIONING */
        .eye-container {
            position: absolute;
            top: 17.5%;  /* Move this to align with the gorilla's face */
            left: 50%;
            transform: translateX(-50%);
            width: 20%; /* Distance between eyes */
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        /* THE "Drawn" DOT EYES */
        .eye-dot {
            width: 15px;
            height: 15px;
            background-color: #ff0000; /* Creepy Red */
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; /* Glowing effect */
            position: relative;
        }

        /* Optional: Adding a tiny black pupil inside the dot */
        .eye-dot::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: black;
            border-radius: 50%;
        }

        #buy-now {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border: 1px solid white;
            font-weight: bold;
            box-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png">
        
        <div class="eye-container">
            <div class="eye-dot"></div>
            <div class="eye-dot"></div>
        </div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye-dot');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                // Instead of rotating the whole eye, we'll shift the dot slightly
                // to simulate it "looking" toward the mouse.
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                
                // Max distance the pupil moves inside the socket (in pixels)
                const distance = 4; 
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                eye.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
