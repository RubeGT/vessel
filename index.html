<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>merch</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            perspective: 1000px; 
            color: white;
        }

        /* Start Screen Styles */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #start-screen h1 {
            font-size: 40px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        #continue-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        /* Main Promo Styles */
        #main-content {
            display: none; /* Hidden until Continue is clicked */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes promoRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        #promo-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: promoRotate 10s infinite linear;
            transform-style: preserve-3d;
        }

        #floating-text {
            color: #d1d1d1; 
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
        }

        #plushie-img {
            max-width: 80vw;
            max-height: 60vh;
            display: block;
        }

        #order-btn {
            margin-top: 40px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            z-index: 10;
        }

        #order-btn img {
            width: 300px; 
            display: block;
        }

        /* Overlay */
        #purchase-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>welcome to mErch stOre!</h1>
        <button id="continue-btn">CONTINUE</button>
    </div>

    <!-- Background Audio -->
    <audio id="ambient-noise" loop>
        <source src="ambient.mp3" type="audio/mp3">
    </audio>

    <!-- Main Content -->
    <div id="main-content">
        <div id="promo-wrapper">
            <div id="floating-text">New Merch!</div>
            <div id="plushie-container">
                <img src="fullbody.png" id="plushie-img" alt="THE VESSEL">
            </div>
        </div>

        <button id="order-btn">
            <img src="button.png" alt="Order Now!">
        </button>
    </div>

    <!-- Purchase Overlay -->
    <div id="purchase-overlay">
        <div>
            <h1>PROCESSING TRANSACTION...</h1>
            <div class="loader"></div>
            <p>Verifying with VISA...</p>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const continueBtn = document.getElementById('continue-btn');
        const mainContent = document.getElementById('main-content');
        const overlay = document.getElementById('purchase-overlay');
        const audio = document.getElementById('ambient-noise');

        // This function handles the "Auto-Click" logic
        function autoProcess() {
            overlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 3000);
        }

        continueBtn.addEventListener('click', () => {
            // 1. Hide start screen, show main content
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';

            // 2. Play Audio (Now allowed because of the click)
            audio.play().catch(e => console.log("Audio failed"));

            // 3. Start the auto-redirect timer (e.g., 5 seconds after entry)
            setTimeout(autoProcess, 5000);
        });
    </script>
</body>
</html>
