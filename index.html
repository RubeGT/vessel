<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vessel</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #plushie-wrapper {
            position: relative;
            /* Adjust this width to match your actual bodynoeyes.png size */
            width: 600px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        /* 
           TARGETING THE FACE PLATE:
           Based on your provided proportions, the face is roughly 
           1/5th down from the top.
        */
        .eye-container {
            position: absolute;
            top: 17%;  /* Adjusted for the specific head height */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 12px; /* This controls how far apart the eyes are */
            z-index: 2;
            pointer-events: none;
        }

        .eye-socket {
            width: 32px; /* Size of the eyes.png */
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-img {
            width: 100%;
            height: auto;
            transform-origin: center center;
        }

        #buy-now {
            margin-top: 20px;
            background: #ff0000;
            color: white;
            padding: 15px 35px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer;
            text-decoration: none;
            font-size: 22px;
            text-align: center;
            box-shadow: 0 0 15px #ff0000;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png">
        
        <div class="eye-container">
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img">
            </div>
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img">
            </div>
        </div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">
            buy now!
        </a>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye-img');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const rot = angle * (180 / Math.PI);

                // Added 90 degree offset. 
                // Adjust if the pupils aren't pointing at the mouse.
                eye.style.transform = `rotate(${rot + 90}deg)`;
            });
        });
    </script>
</body>
</html>
