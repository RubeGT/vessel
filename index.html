<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>merch</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Ambient Vibration Animation */
        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 1px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        #plushie-container {
            position: relative;
            animation: vibrate 0.2s infinite; /* Constant subtle shaking */
        }

        #plushie-img {
            max-width: 80vw;
            max-height: 70vh;
            display: block;
        }

        #order-btn {
            margin-top: 30px;
            background: #ff0000;
            color: white;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0000;
            transition: transform 0.2s;
        }

        #order-btn:active {
            transform: scale(0.95);
        }

        /* Fake Purchasing Overlay */
        #purchase-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            color: white;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Background Audio (Autoplay may require user interaction first) -->
    <audio id="ambient-noise" loop>
        <source src="ambient.mp3" type="audio/mp3">
    </audio>

    <div id="plushie-container">
        <img src="fullbody.png" id="plushie-img" alt="THE VESSEL">
    </div>

    <button id="order-btn">Order Now!</button>

    <!-- Fake Purchase Modal -->
    <div id="purchase-overlay">
        <div>
            <h1>PROCESSING TRANSACTION...</h1>
            <div class="loader"></div>
            <p>Verifying with VISA...</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('order-btn');
        const overlay = document.getElementById('purchase-overlay');
        const audio = document.getElementById('ambient-noise');

        // Start audio on first click (Browser restriction fix)
        document.body.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio waiting for interaction"));
        }, { once: true });

        btn.addEventListener('click', () => {
            // Show the fake purchasing screen
            overlay.style.display = 'flex';

            // Wait 3 seconds, then redirect
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 3000);
        });
    </script>
</body>
</html>
