<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #vessel-container {
            position: relative;
            width: 700px; 
            height: 800px;
            margin-right: 20px;
            /* Keeps everything aligned to the bottom right */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        #body-img {
            width: 100%;
            height: auto;
            z-index: 1;
            pointer-events: none;
        }

        #head-wrapper {
            position: absolute;
            /* MANUAL ALIGNMENT - Adjust these to "dock" the head to the neck */
            width: 320px; 
            bottom: 485px; 
            left: 170px;
            
            z-index: 2;
            /* SML STYLE: Pivot from the bottom middle of the head */
            transform-origin: bottom center; 
            will-change: transform;
            pointer-events: none;
        }

        #head-img {
            width: 100%;
            display: block;
        }

        #buy-now {
            position: fixed;
            bottom: 30px;
            left: 30px; /* Kept away from the plushie */
            background: #ff0000;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border: 2px solid white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>

    <div id="vessel-container">
        <div id="head-wrapper">
            <img src="head.png" id="head-img">
        </div>
        <img src="body.png" id="body-img">
    </div>

    <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>

    <script>
        const head = document.getElementById('head-wrapper');

        document.addEventListener('mousemove', (e) => {
            const rect = head.getBoundingClientRect();
            
            // The "hinge" point at the bottom of the head
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.bottom;

            const deltaX = e.clientX - centerX;
            const deltaY = e.clientY - centerY;

            // Math.atan2 gives the angle in radians
            const angle = Math.atan2(deltaY, deltaX);
            
            // Convert to degrees
            let deg = angle * (180 / Math.PI);

            // SML Logic: The head image is vertical, but we want it to 
            // tilt left/right based on mouse position.
            // Adjust the '+ 90' if the head starts sideways.
            let finalRotation = deg + 90;

            // CLAMPING: Prevents the head from doing a full 360
            // This creates that "stuck on a neck" feel
            if (finalRotation > 45) finalRotation = 45;
            if (finalRotation < -45) finalRotation = -45;

            head.style.transform = `rotate(${finalRotation}deg)`;
        });
    </script>
</body>
</html>
