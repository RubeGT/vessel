<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>merch</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            perspective: 1000px; 
        }

        /* Smooth 360 Promo Rotation */
        @keyframes promoRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        #promo-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: promoRotate 10s infinite linear; /* Rotates the whole set */
            transform-style: preserve-3d;
        }

        #floating-text {
            color: #d1d1d1; 
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            backface-visibility: hidden;
        }

        #plushie-container {
            position: relative;
            /* Shake removed from here */
        }

        #plushie-img {
            max-width: 80vw;
            max-height: 60vh;
            display: block;
        }

        /* Image-based Button */
        #order-btn {
            margin-top: 40px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            z-index: 10;
        }

        #order-btn img {
            width: 300px; 
            display: block;
        }

        #order-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        #order-btn:active {
            transform: scale(0.95);
        }

        /* Fake Purchasing Overlay */
        #purchase-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            color: white;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="ambient-noise" loop>
        <source src="ambient.mp3" type="audio/mp3">
    </audio>

    <div id="promo-wrapper">
        <div id="floating-text">New Merch!</div>
        
        <div id="plushie-container">
            <img src="fullbody.png" id="plushie-img" alt="THE VESSEL">
        </div>
    </div>

    <!-- Image Button -->
    <button id="order-btn">
        <img src="button.png" alt="Order Now!">
    </button>

    <div id="purchase-overlay">
        <div>
            <h1>PROCESSING TRANSACTION...</h1>
            <div class="loader"></div>
            <p>Verifying with VISA...</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('order-btn');
        const overlay = document.getElementById('purchase-overlay');
        const audio = document.getElementById('ambient-noise');

        // Audio trigger
        document.body.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio play blocked"));
        }, { once: true });

        btn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 3000);
        });
    </script>
</body>
</html>
