<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE PLUSHIE</title>
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Container for the plushie and eyes */
        #plushie-wrapper {
            position: relative;
            width: 500px; /* Adjust based on your actual image size */
            height: auto;
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        /* 
           This container holds the eyes. 
           Position this exactly over the eye area of the body.
        */
        .eye-container {
            position: absolute;
            top: 35%;  /* Adjust these % to line up with the sockets */
            left: 50%;
            transform: translateX(-50%);
            width: 40%; /* Width of the area where both eyes are */
            height: 20%;
            display: flex;
            justify-content: space-around;
            z-index: 2;
            pointer-events: none;
        }

        .eye-socket {
            width: 60px; /* Adjust size of eye image */
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-img {
            width: 100%;
            height: auto;
            /* The secret sauce: rotating from the center of the eye */
            transform-origin: center center; 
            transition: transform 0.05s linear;
        }

        #buy-now {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 15px 30px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        #buy-now:hover {
            background: #fff;
            color: #f00;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png" alt="Plushie Body">
        
        <div class="eye-container">
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img" id="left-eye">
            </div>
            <div class="eye-socket">
                <img src="eyes.png" class="eye-img" id="right-eye">
            </div>
        </div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye-img');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                
                // Get the center of the individual eye
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                // Angle between mouse and eye center
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const rot = angle * (180 / Math.PI);

                /* 
                   If your eyes.png is looking 'up' by default, 
                   you might need to add 90 to the rotation.
                   Example: `rotate(${rot + 90}deg)`
                */
                eye.style.transform = `rotate(${rot}deg)`;
            });
        });
    </script>
</body>
</html>
