<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>merch</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            perspective: 1000px; 
            color: white;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #start-screen h1 {
            font-size: 40px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
        }

        #continue-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        /* Main Promo Section */
        #main-content {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        @keyframes promoRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        #promo-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: promoRotate 10s infinite linear;
            transform-style: preserve-3d;
        }

        #items-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 80px; 
        }

        #floating-text {
            color: #d1d1d1; 
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
        }

        .merch-img {
            max-width: 35vw; 
            max-height: 45vh;
            display: block;
            transition: transform 0.3s;
        }

        /* Hover effect for individual items */
        .merch-item:hover .merch-img {
            transform: scale(1.1);
        }

        .item-label {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ff0000;
        }

        #order-btn {
            margin-top: 40px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            z-index: 10;
        }

        #order-btn img {
            width: 250px; 
            display: block;
        }

        #purchase-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>welcome to mErch stOre!</h1>
        <button id="continue-btn">CONTINUE</button>
    </div>

    <audio id="ambient-noise" loop>
        <source src="ambient.mp3" type="audio/mp3">
    </audio>

    <div id="main-content">
        <div id="promo-wrapper">
            <div id="floating-text">Choose Your Vessel</div>
            <div id="items-row">
                
                <!-- PLUSHIE (Standard flow) -->
                <div class="merch-item">
                    <img src="fullbody.png" class="merch-img" alt="THE PLUSHIE">
                    <div class="item-label">PLUSHIE</div>
                </div>

                <!-- SHIRT (Direct Redirect) -->
                <a href="https://flesh.freegorillatagdownload.com" class="merch-item" style="text-decoration: none; color: inherit;">
                    <img src="shirt.png" class="merch-img" alt="THE SHIRT">
                    <div class="item-label">SHIRT</div>
                </a>

            </div>
        </div>

        <!-- This button still controls the Plushie/Main redirect logic -->
        <button id="order-btn">
            <img src="button.png" alt="Order Now!">
        </button>
    </div>

    <div id="purchase-overlay">
        <div>
            <h1>PROCESSING TRANSACTION...</h1>
            <div class="loader"></div>
            <p>Verifying with VISA...</p>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const continueBtn = document.getElementById('continue-btn');
        const mainContent = document.getElementById('main-content');
        const orderBtn = document.getElementById('order-btn');
        const overlay = document.getElementById('purchase-overlay');
        const audio = document.getElementById('ambient-noise');

        function fadeInAudio(audioElement, duration) {
            audioElement.volume = 0;
            audioElement.play();
            let volume = 0;
            const interval = 50; 
            const step = interval / duration;
            const fadeIn = setInterval(() => {
                volume += step;
                if (volume >= 1) {
                    audioElement.volume = 1;
                    clearInterval(fadeIn);
                } else {
                    audioElement.volume = volume;
                }
            }, interval);
        }

        continueBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            fadeInAudio(audio, 3000);
        });

        orderBtn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://devoure.freegorillatagdownload.com";
            }, 3000);
        });
    </script>
</body>
</html>
