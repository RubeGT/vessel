<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #vessel-container {
            position: relative;
            /* Scaled up significantly */
            width: 800px; 
            height: 800px;
            margin-right: -50px; /* Let the arms bleed off slightly */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* THE BODY */
        #body-img {
            position: absolute;
            width: 100%;
            height: auto;
            bottom: 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* THE HEAD WRAPPER */
        #head-wrapper {
            position: absolute;
            /* Alignment: Adjust 'bottom' and 'left' to lock head to neck */
            bottom: 512px; 
            left: 442px;
            width: 150px; 
            z-index: 2;
            /* Pivot point: Bottom center of the head image */
            transform-origin: bottom center; 
            will-change: transform;
        }

        #head-img {
            width: 100%;
            height: auto;
            display: block;
        }

        #buy-now {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #ff0000;
            color: white;
            padding: 20px 40px;
            text-decoration: none;
            border: 3px solid white;
            font-weight: bold;
            font-size: 28px;
            box-shadow: 0 0 30px #ff0000;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="vessel-container">
        <!-- HEAD -->
        <div id="head-wrapper">
            <img src="head.png" id="head-img">
        </div>

        <!-- BODY -->
        <img src="body.png" id="body-img">
    </div>

    <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>

    <script>
        const head = document.getElementById('head-wrapper');

        document.addEventListener('mousemove', (e) => {
            const rect = head.getBoundingClientRect();
            
            // Pivot point is at the bottom center of the head
            const pivotX = rect.left + (rect.width / 2);
            const pivotY = rect.bottom;

            // Calculate angle between mouse and neck pivot
            const deltaY = e.clientY - pivotY;
            const deltaX = e.clientX - pivotX;
            const angle = Math.atan2(deltaY, deltaX);
            
            // Convert to degrees
            let rotation = angle * (180 / Math.PI);

            /* 
               OFFSET CALIBRATION
               Since it's a side view, we want to limit the look 
               so the head doesn't spin 360 degrees.
            */
            // Adjust the '+ 90' or '- 90' until the head "points" correctly
            let finalRotation = rotation + 90;

            // Clamp rotation so he doesn't snap his neck (Optional)
            if (finalRotation > 30) finalRotation = 30;
            if (finalRotation < -60) finalRotation = -60;

            head.style.transform = `rotate(${finalRotation}deg)`;
        });
    </script>
</body>
</html>
