<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #plushie-wrapper {
            position: relative;
            display: inline-block;
            width: 600px; 
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* Base properties for both eyes */
        .eye-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #fff; /* Plain white/grey dots */
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
        }

        /* 
           CALIBRATION SECTION:
           Manually nudge these until they sit in the sockets.
        */
        #eye-left {
            top: 18.5%;   
            left: 42.5%;  /* Moved a tad left */
        }

        #eye-right {
            top: 18.5%;
            left: 52.5%; /* Adjust this to fix the offset */
        }

        #buy-now {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border: 1px solid white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png">
        
        <!-- Individual eyes for precise control -->
        <div class="eye-dot" id="eye-left"></div>
        <div class="eye-dot" id="eye-right"></div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye-dot');

        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                
                // The distance the dot moves toward your mouse
                const distance = 3; 
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                eye.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
