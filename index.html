<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VESSEL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #plushie-wrapper {
            position: relative;
            display: inline-block;
            width: 600px; 
        }

        #plushie-body {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* 
           THE SOCKETS
           These are invisible areas that define where the eyes live.
        */
        .eye-socket {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Corrected pivot positions based on your screenshot */
        #socket-left {
            top: 17.5%;
            left: 44%; 
        }

        #socket-right {
            top: 17.5%;
            left: 51.5%;
        }

        /* THE EYES (Small Black Dots) */
        .eye-dot {
            width: 6px;
            height: 6px;
            background-color: #000;
            border-radius: 50%;
            transition: transform 0.1s ease-out;
        }

        #buy-now {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border: 1px solid white;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="plushie-wrapper">
        <img id="plushie-body" src="bodynoeyes.png">
        
        <!-- Left Eye Group -->
        <div class="eye-socket" id="socket-left">
            <div class="eye-dot"></div>
        </div>

        <!-- Right Eye Group -->
        <div class="eye-socket" id="socket-right">
            <div class="eye-dot"></div>
        </div>

        <a href="https://vessel.freegorillatagdownload.com" id="buy-now">ORDER THE VESSEL</a>
    </div>

    <script>
        const dots = document.querySelectorAll('.eye-dot');

        document.addEventListener('mousemove', (e) => {
            dots.forEach(dot => {
                const rect = dot.getBoundingClientRect();
                const dotX = rect.left + rect.width / 2;
                const dotY = rect.top + rect.height / 2;

                const angle = Math.atan2(e.clientY - dotY, e.clientX - dotX);
                
                // Max movement range within the socket
                const distance = 8; 
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                dot.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
